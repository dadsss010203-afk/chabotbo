version: "3.8"
services:
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: ollama-correos
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  chatbot:
    build: .
    container_name: chatbot-correos
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
